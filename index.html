<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0">
<title>ContractTradingTool (CTBox)</title>
<link rel="icon" href="data:image/svg+xml,<svg xmlns='' viewBox='0 0 32 32'><rect width='32' height='32' rx='6' fill='%23080a0f'/><text x='50%' y='54%' font-size='18' text-anchor='middle' dominant-baseline='middle' fill='%2300e676' font-family='monospace' font-weight='bold'>C</text></svg>">
  <link rel="stylesheet" href="css/style.css">
  <script>
    window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };

<body>

<!-- Loading -->
<div class="loading-overlay" id="loadingOverlay">
  <div class="loader-ring"></div>
  <div class="loader-text" id="loaderText">INITIALIZING...</div>
</div>

<!-- Header -->
<div class="header">
  <div class="logo">Trading<span>/</span>Tool</div>
  <nav class="page-tabs" id="mainTabs">
    <button class="page-tab active" data-page="analysis" onclick="switchPage('analysis')">
      <span class="tab-icon">◎</span><span class="tab-label">合约分析</span>
    </button>
    <button class="page-tab" data-page="event" onclick="switchPage('event')">
      <span class="tab-icon">◈</span><span class="tab-label">事件合约</span>
    </button>
    <button class="page-tab" data-page="monitor" onclick="switchPage('monitor')">
      <span class="tab-icon">◉</span><span class="tab-label">数据监控</span>
    </button>
    <button class="page-tab" data-page="calc" onclick="switchPage('calc')">
      <span class="tab-icon">▦</span><span class="tab-label">计算器</span>
    </button>
    <button class="page-tab" data-page="live" onclick="switchPage('live')">
      <span class="tab-icon">◐</span><span class="tab-label">广场直播</span>
    </button>
  </nav>
  <div class="header-controls" id="analysisControls">
    <div class="symbol-search-wrap" id="symbolSearchWrap">
      <input type="text" id="symbolInput" placeholder="BTC/USDT" autocomplete="off"
        class="symbol-input"
        onclick="openSymbolDropdown()"
        oninput="filterSymbols(this.value)"
        onblur="setTimeout(closeSymbolDropdown, 200)"
      />
      <div id="symbolDropdown" style="display:none;position:fixed;
           background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r);
           z-index:99999;max-height:300px;overflow-y:auto;min-width:180px;
           box-shadow:0 8px 32px rgba(0,0,0,0.6);">
      </div>
    </div>
    <input type="hidden" id="symbolSelect" value="BTCUSDT">
    <select id="intervalSelect">
      <option value="15m">15分钟</option>
      <option value="1h" selected>1小时</option>
      <option value="4h">4小时</option>
      <option value="1d">日线</option>
    </select>
    <button class="btn btn-primary" id="refreshBtn" onclick="loadAll()">⟳ 分析</button>
    <div class="status-dot" id="statusDot"></div>
  </div>
  <div class="last-update" id="lastUpdate">--</div>
  <button id="themeToggle" onclick="toggleTheme()" title="切换亮暗模式">🌙</button>
</div>

<div id="pageAnalysis" class="page-view active">
</div>

<div id="pageEvent" class="page-view">
</div>
<div id="pageMonitor" class="page-view">
</div>
<div id="pageLive" class="page-view">
</div>

<div id="pageCalc" class="page-view">
</div>

  <script src="js/config.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/indicators.js"></script>
  <script src="js/api.js"></script>
  <script src="js/render.js"></script>
  <script src="js/analysis.js"></script>
  <script src="js/event.js"></script>
  <script src="js/calc.js"></script>
  <script src="js/monitor.js"></script>
  <script src="js/app.js"></script>


<nav id="mobileTabBar" class="mobile-tab-bar">
  <button class="mobile-tab active" data-page="analysis" onclick="switchPage('analysis')">
    <span class="mobile-tab-icon">◎</span>
    <span class="mobile-tab-label">合约分析</span>
  </button>
  <button class="mobile-tab" data-page="event" onclick="switchPage('event')">
    <span class="mobile-tab-icon">◈</span>
    <span class="mobile-tab-label">事件合约</span>
  </button>
  <button class="mobile-tab" data-page="monitor" onclick="switchPage('monitor')">
    <span class="mobile-tab-icon">◉</span>

  </button>
  <button class="mobile-tab" data-page="calc" onclick="switchPage('calc')">
    <span class="mobile-tab-icon">▦</span>
    <span class="mobile-tab-label">计算器</span>
  </button>
  <button class="mobile-tab" data-page="live" onclick="switchPage('live')">
    <span class="mobile-tab-icon">◐</span>
    <span class="mobile-tab-label">广场直播</span>
  </button>
</nav>

  <div id="briefModal" style="display:none;position:fixed;inset:0;z-index:5000;background:rgba(0,0,0,0.75);padding:16px;padding-bottom:calc(16px + env(safe-area-inset-bottom, 0px));overflow-y:auto;-webkit-overflow-scrolling:touch;" onclick="if(event.target===this)closeBrief()">
    <div style="max-width:640px;margin:0 auto;background:var(--bg1);border:1px solid var(--border2);border-radius:var(--r-xl);overflow:hidden;">
      <div style="padding:20px 24px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;">
        <div style="display:flex;align-items:center;gap:10px;">
          <span style="font-size:20px;">📖</span>
          <div>
            <div style="font-family:var(--mono);font-size:14px;font-weight:700;color:var(--gold);letter-spacing:2px;">标题</div>
            <div style="font-size:11px;color:var(--text-muted);margin-top:2px;">介绍标题</div>
          </div>
        </div>
        <button onclick="closeBrief()" style="background:none;border:none;color:var(--text-muted);font-size:20px;cursor:pointer;padding:4px 8px;border-radius:var(--r);">×</button>
      </div>
      <div style="padding:24px;display:flex;flex-direction:column;gap:20px;">

        <div style="font-size:14px;color:var(--text-dim);line-height:1.8;">
          ********
        </div>

        <div style="display:flex;flex-direction:column;gap:12px;">

          <div style="background:var(--bg2);border-radius:var(--r-lg);padding:16px;">
            <div style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:8px;">**</div>
            <div style="font-size:13px;color:var(--text-dim);line-height:1.7;">***</div>
          </div>

          <div style="background:var(--bg2);border-radius:var(--r-lg);padding:16px;">
            <div style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--blue);letter-spacing:1px;margin-bottom:8px;">**</div>
            <div style="font-size:13px;color:var(--text-dim);line-height:1.7;">***</div>
          </div>

          <div style="background:var(--bg2);border-radius:var(--r-lg);padding:16px;">
            <div style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--green);letter-spacing:1px;margin-bottom:8px;">**</div>
            <div style="font-size:13px;color:var(--text-dim);line-height:1.7;">***</div>
          </div>

          <div style="background:var(--bg2);border-radius:var(--r-lg);padding:16px;">
            <div style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--purple);letter-spacing:1px;margin-bottom:8px;">**</div>
            <div style="font-size:13px;color:var(--text-dim);line-height:1.7;">***</div>
          </div>

          <div style="background:var(--bg2);border-radius:var(--r-lg);padding:16px;">
            <div style="font-family:var(--mono);font-size:11px;font-weight:700;color:var(--gold);letter-spacing:1px;margin-bottom:8px;">**</div>
            <div style="font-size:13px;color:var(--text-dim);line-height:1.7;">***</div>
          </div>

        </div>

        <div style="background:rgba(240,185,11,0.06);border:1px solid rgba(240,185,11,0.2);border-radius:var(--r-lg);padding:14px;">
          <div style="font-size:11px;color:var(--gold);font-family:var(--mono);margin-bottom:6px;">⚠ 免责声明</div>
          <div style="font-size:12px;color:var(--text-muted);line-height:1.7;">本工具所有数据仅供参考，不构成任何投资建议。加密货币市场风险极高，请根据自身风险承受能力谨慎决策。</div>
        </div>

        <button onclick="closeBrief()" style="background:var(--gold);color:#000;font-weight:700;font-family:var(--mono);font-size:12px;padding:10px;border:none;border-radius:var(--r-lg);cursor:pointer;letter-spacing:1px;">关 闭</button>
      </div>
